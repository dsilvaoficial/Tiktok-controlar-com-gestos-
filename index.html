<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini TikTok Inteligente</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

.video-container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

.status {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.8;
}

.ai {
  font-size: 12px;
  opacity: 0.6;
}

.flash {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: 0.2s;
}

/* Botão ativar */
#startBtn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 25px;
  font-size: 18px;
  z-index: 9999;
  border: none;
  border-radius: 10px;
  background: #00c6ff;
  color: black;
}
</style>
</head>

<body>

<!-- 🔥 BOTÃO ESSENCIAL -->
<button id="startBtn">Ativar Controle</button>

<div class="video-container">
  <video id="video" autoplay muted loop></video>

  <div class="overlay">
    <h3>@usuario</h3>
    <p>🔥 Controle sem toque</p>
  </div>

  <div class="status" id="status">
    IA analisando comportamento...
    <div class="ai" id="ai"></div>
  </div>

  <div class="flash" id="flash"></div>
</div>

<script>
const video = document.getElementById("video");
const status = document.getElementById("status");
const ai = document.getElementById("ai");
const flash = document.getElementById("flash");
const startBtn = document.getElementById("startBtn");

// 🎬 vídeos de teste
const videos = [
  "https://www.w3schools.com/html/mov_bbb.mp4",
  "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
  "https://www.w3schools.com/html/movie.mp4"
];

let index = 0;
let lastTilt = 0;
let cooldown = false;

// Carregar vídeo
function loadVideo() {
  video.src = videos[index];
  video.play();
}

// Próximo vídeo
function nextVideo() {
  index = (index + 1) % videos.length;
  efeito();
  loadVideo();
}

// Vídeo anterior
function prevVideo() {
  index = (index - 1 + videos.length) % videos.length;
  efeito();
  loadVideo();
}

// Efeito visual
function efeito() {
  flash.style.opacity = 0.4;
  setTimeout(() => flash.style.opacity = 0, 200);
}

// Fake IA
function fakeAI() {
  const msgs = [
    "Detectando gesto...",
    "Analisando intenção...",
    "IA ativa...",
    "Reconhecendo padrão...",
    "Ajustando resposta..."
  ];
  ai.innerText = msgs[Math.floor(Math.random() * msgs.length)];
}
setInterval(fakeAI, 2000);

// 🔥 ATIVAR SENSOR
startBtn.addEventListener("click", () => {

  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {

    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === "granted") {
          iniciarControle();
          startBtn.style.display = "none";
        }
      });

  } else {
    iniciarControle();
    startBtn.style.display = "none";
  }

});

// 🔥 CONTROLE REAL
function iniciarControle() {
  window.addEventListener("deviceorientation", (event) => {

    const tilt = event.gamma; // lateral

    if (!tilt || cooldown) return;

    if (tilt > 20) {
      nextVideo();
      status.innerHTML = "➡️ Próximo vídeo (IA)";
      cooldown = true;

    } else if (tilt < -20) {
      prevVideo();
      status.innerHTML = "⬅️ Vídeo anterior (IA)";
      cooldown = true;
    }

    setTimeout(() => cooldown = false, 1000);
    lastTilt = tilt;

  });
}

// iniciar primeiro vídeo
loadVideo();
</script>

</body>
</html>
