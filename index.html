<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Controle Automático</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

.overlay {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

.status {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 14px;
}

.like {
  position: absolute;
  right: 20px;
  bottom: 120px;
  font-size: 30px;
  opacity: 0.3;
  transition: 0.3s;
}

.like.active {
  opacity: 1;
  transform: scale(1.4);
}

.ai {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<video id="video" autoplay muted loop></video>

<div class="overlay">
  <h3>@usuario</h3>
  <p>🔥 Sistema inteligente</p>
</div>

<div class="status" id="status">
  IA analisando você...
  <div class="ai" id="ai"></div>
</div>

<div class="like" id="like">❤️</div>

<script>
const video = document.getElementById("video");
const status = document.getElementById("status");
const ai = document.getElementById("ai");
const like = document.getElementById("like");

const videos = [
  "https://www.w3schools.com/html/mov_bbb.mp4",
  "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
  "https://www.w3schools.com/html/movie.mp4"
];

let index = 0;

// trocar vídeo
function nextVideo() {
  index = (index + 1) % videos.length;
  video.src = videos[index];
  video.play();
}

// curtir vídeo
function likeVideo() {
  like.classList.add("active");
  setTimeout(() => like.classList.remove("active"), 800);
}

// pausar
function pauseVideo() {
  video.pause();
  status.innerHTML = "⏸️ IA pausou o vídeo";
  setTimeout(() => {
    video.play();
    status.innerHTML = "▶️ IA retomou";
  }, 1500);
}

// IA fake mensagens
function fakeAI() {
  const msgs = [
    "Analisando seu interesse...",
    "Detectando atenção...",
    "Ajustando feed...",
    "Prevendo próxima ação...",
    "Otimizando experiência..."
  ];
  ai.innerText = msgs[Math.floor(Math.random() * msgs.length)];
}

setInterval(fakeAI, 2000);

// sistema automático
setInterval(() => {
  const action = Math.random();

  if (action < 0.4) {
    nextVideo();
    status.innerHTML = "➡️ IA mudou o vídeo";

  } else if (action < 0.7) {
    likeVideo();
    status.innerHTML = "❤️ IA curtiu";

  } else {
    pauseVideo();
  }

}, 4000);

// iniciar
video.src = videos[0];
video.play();

</script>

</body>
</html>
